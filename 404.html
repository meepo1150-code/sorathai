<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ไม่พบหน้านี้ — Sorathai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.err-wrap{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;max-width:480px;margin:0 auto}
.err-ico{font-size:56px;margin-bottom:24px;animation:breathe 4s ease-in-out infinite}
.err-ttl{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--text);margin-bottom:10px}
.err-sub{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:40px}
.err-links{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.err-btn{display:block;background:var(--text);color:var(--bg);text-decoration:none;border-radius:99px;font-family:var(--sans);font-size:15px;font-weight:700;padding:15px;text-align:center}
.err-btn.ghost{background:transparent;color:var(--t2);border:0.5px solid var(--bmd)}
</style>
</head>
<body style="background:var(--bg)">
<div class="err-wrap">
  <div class="err-ico">🔮</div>
  <h1 class="err-ttl">หน้านี้ไม่มีอยู่</h1>
  <p class="err-sub">ดาวพาคุณมาผิดทาง<br>ลองกลับไปที่หน้าหลักแล้วดูดวงใหม่อีกครั้ง</p>
  <div class="err-links">
    <a class="err-btn" href="/">กลับหน้าหลัก</a>
    <a class="err-btn ghost" href="dream.html">ทำนายฝัน</a>
  </div>
</div>
</body>
</html>
